<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 100" role="img" aria-labelledby="title desc">
  <title id="title">QodeSeven Technology</title>
  <desc id="desc">Logotipo QodeSeven com [Q7] em teal e assinatura abaixo.</desc>

  <defs>
    <linearGradient id="q7grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1dc9a4"/>
      <stop offset="100%" stop-color="#00e5c0"/>
    </linearGradient>
    <filter id="q7glow" x="-30%" y="-50%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="2.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <text x="180" y="54" text-anchor="middle" font-family="'Space Mono', monospace" font-size="52" font-weight="700" letter-spacing="2" fill="url(#q7grad)" filter="url(#q7glow)">[Q7]</text>
  <line x1="118" y1="64" x2="242" y2="64" stroke="#1dc9a4" stroke-opacity="0.55" stroke-width="1"/>
  <text x="180" y="82" text-anchor="middle" font-family="'DM Sans', sans-serif" font-size="11" font-weight="600" letter-spacing="4" fill="#dbe4f0" fill-opacity="0.78">QODESEVEN TECHNOLOGY</text>
</svg>
